name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build_verification:
    name: Code Validation & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
      
      - name: Setup Node.js (Latest LTS)
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Restore Next.js Build Cache
        uses: actions/cache@v5
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**/*.[jt]s', '**/*.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-

      - name: Generate Prisma ORM Types
        run: npx prisma generate

      - name: Run Strict Lint & Type Check
        run: npm run check

      - name: Execute Production Build
        run: npm run build
        env:
          DATABASE_URL: "postgresql://postgres:password@localhost:5432/stack"
          NEXTAUTH_SECRET: "ci-secret-very-long-and-secure"
          NEXTAUTH_URL: "http://localhost:3000"
